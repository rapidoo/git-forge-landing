name: Deploy to Scaleway S3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
      AWS_DEFAULT_REGION: fr-par
      S3_ENDPOINT: https://s3.fr-par.scw.cloud
      S3_BUCKET: s3://git-forge.fr

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync files to Scaleway S3
        run: |
          aws s3 sync . $S3_BUCKET \
            --endpoint-url $S3_ENDPOINT \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".vercel/*" \
            --exclude ".DS_Store" \
            --exclude ".gitignore" \
            --acl public-read \
            --delete

      - name: Set content-type for HTML files
        run: |
          for file in $(find . -name "*.html" -not -path "./.git/*" -not -path "./.github/*" -not -path "./.vercel/*"); do
            key="${file#./}"
            aws s3 cp "$S3_BUCKET/${key}" "$S3_BUCKET/${key}" \
              --endpoint-url $S3_ENDPOINT \
              --content-type "text/html; charset=utf-8" \
              --metadata-directive REPLACE \
              --acl public-read
          done

      - name: Enable website hosting
        run: |
          aws s3 website $S3_BUCKET \
            --endpoint-url $S3_ENDPOINT \
            --index-document index.html \
            --error-document index.html
